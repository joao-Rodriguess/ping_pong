<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja - Camera Games</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* CSS Básico Inline para garantir o funcionamento visual imediato */
        .game-container {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
        }

        /* O vídeo cru é escondido, usamos o canvas */
        .input_video {
            display: none;
        }

        /* Canvas da câmera (fundo) */
        .output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Fica atrás do jogo */
            transform: scaleX(-1);
            /* Espelhar a câmera para ficar natural */
        }

        /* Canvas do Jogo (Frutas e Rastro) */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            /* Fica na frente da câmera */
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-family: Arial, sans-serif;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Permite clicar através da UI */
        }

        .score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Adicionado baseado no seu JS: updateCombo() */
        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ffeb3b;
            font-weight: bold;
            display: none;
            /* JS controla isso */
            text-shadow: 0 0 10px #ff9800;
            animation: pop 0.2s ease-out;
            pointer-events: none;
        }

        /* Adicionado baseado no seu JS: document.getElementById('controls') */
        #controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: auto;
            text-align: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 24px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        @keyframes pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="game-header">
        <h1>⚔️ Fruit Ninja AI</h1>
    </div>

    <div class="game-container">

        <video class="input_video"></video>

        <canvas class="output_canvas" width="640" height="480"></canvas>

        <canvas id="gameCanvas" width="640" height="480"></canvas>

        <div class="ui-layer">
            <div class="game-status-bar" style="position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: none;">
                <div id="scoreDisplay" style="font-size: 24px; color: #00f3ff; font-family: 'Orbitron', sans-serif; font-weight: 700; text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);">Score: 0</div>
                <div id="livesDisplay" class="lives-container" style="font-size: 24px;">❤️ ❤️ ❤️</div>
            </div>
            <div id="comboDisplay" class="combo-display" style="display: none;"></div>
        </div>

        <div id="controls">
            <button id="startBtn" class="btn">PLAY</button>
        </div>

    </div>

    <script src="shared.js"></script>
    <script src="fruit-ninja.js"></script>
</body>

</html>
