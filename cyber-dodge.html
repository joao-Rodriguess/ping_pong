<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Dodge - Camera Games</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🛡️ Cyber Dodge</h1>
        </div>

        <div id="scoreDisplay" class="score-display">Score: 0</div>
        <div id="livesDisplay" class="lives-display">❤️ x 3</div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="controls-overlay" id="controls">
            <h3>Como Jogar</h3>
            <p>👤 Mova ou incline a cabeça para os lados para mover a nave horizontalmente</p>
            <p>🔴 Desvie dos blocos de energia vermelhos em queda!</p>
            <p>💎 Colete os cristais de energia ciano brilhantes para ganhar pontos!</p>
            <button class="btn" id="startBtn">Iniciar Jogo</button>
        </div>

        <div class="video-preview">
            <video class="input_video" style="display: none;"></video>
            <canvas class="output_canvas" width="240" height="180"></canvas>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="cyber-dodge.js"></script>
</body>

</html>
